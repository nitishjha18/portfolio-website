<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Terminal-style portfolio website for Nitish Jha."
    />
    <title>Nitish Jha | Terminal Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="matrix-canvas" aria-hidden="true"></canvas>
    <div class="scanlines" aria-hidden="true"></div>

    <div id="boot-screen" class="boot-screen" aria-live="polite">
      <div class="terminal-window boot-window">
        <div class="terminal-bar">
          <span class="terminal-dot"></span>
          <span class="terminal-dot"></span>
          <span class="terminal-dot"></span>
          <span>NITISH_OS_BOOT</span>
        </div>
        <div id="boot-output" class="boot-output"></div>
      </div>
    </div>

    <main id="main-ui" class="site-shell hidden">
      <section
        class="terminal-window app-terminal"
        aria-label="Interactive portfolio terminal"
      >
        <div class="terminal-bar">
          <span class="terminal-dot"></span>
          <span class="terminal-dot"></span>
          <span class="terminal-dot"></span>
          <span>NITISH_OS_TERMINAL</span>
        </div>

        <div
          id="terminal-output"
          class="terminal-output interactive-output"
          aria-live="polite"
        ></div>

        <div class="terminal-social-row" aria-label="Social links">
          <a href="https://github.com/nitishjha18" target="_blank" rel="noreferrer">
            [github]
          </a>
          <span aria-hidden="true">|</span>
          <a
            href="https://www.linkedin.com/in/nitishjha11/"
            target="_blank"
            rel="noreferrer"
          >
            [linkedin]
          </a>
          <span aria-hidden="true">|</span>
          <a href="mailto:nitish11jha@gmail.com">[gmail]</a>
          <span aria-hidden="true">|</span>
          <a
            href="https://drive.google.com/file/d/1G5jrw65oS_2kqP9I_4X9mk00HkPPjw4d/view?usp=sharing"
            target="_blank"
            rel="noreferrer"
          >
            [resume]
          </a>
        </div>
        <div class="terminal-social-divider" aria-hidden="true"></div>

        <form id="terminal-form" class="terminal-input-row" autocomplete="off">
          <label class="terminal-prompt" for="terminal-input">
            visitor@nitishjha.dev:~$
          </label>
          <input
            id="terminal-input"
            class="terminal-input"
            type="text"
            aria-label="Terminal command input"
            autocapitalize="off"
            autocomplete="off"
            spellcheck="false"
          />
        </form>
      </section>

      <footer class="footer terminal-panel">
        <span class="status-dot" aria-hidden="true"></span>
        <span>system online</span>
        <span class="dim">uptime:</span>
        <time id="uptime">00:00:00</time>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
